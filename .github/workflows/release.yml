name: "Release with Yaba"

on: 
  workflow_dispatch:
    inputs:
        release-descriptor:
          required: true
          description: Release title
          default: ''
        tag-name:
          required: true
          description: Tag name
          default: ''
permissions:
  contents: write

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run test suite
        run: npm test
      - name: Verify release tag matches package version
        run: |
          PKG_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          EXPECTED_TAG="v${PKG_VERSION}"
          PROVIDED_TAG="${{ github.event.inputs.tag-name }}"

          if [ -z "$PROVIDED_TAG" ]; then
            echo "Missing release tag input. Provide a tag like ${EXPECTED_TAG}."
            exit 1
          fi

          if [ "$PROVIDED_TAG" != "$EXPECTED_TAG" ]; then
            echo "Tag mismatch: provided '$PROVIDED_TAG' but package.json expects '$EXPECTED_TAG'."
            echo "Update package.json version or use the matching tag."
            exit 1
          fi

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install Yaba
        run: npm install -g yaba-release-cli
      - name: Create GitHub release
        env:
          YABA_GITHUB_ACCESS_TOKEN: ${{ github.token }}
          YABA_GITHUB_REPO_OWNER: ${{ github.repository_owner }}
        run: yaba release create -i false -r ${{ github.event.repository.name }} -n "${{ github.event.inputs.release-descriptor }}" -t "${{ github.event.inputs.tag-name }}"

  publish-npm:
    name: Publish to npm Registry
    needs: release
    uses: ./.github/workflows/publish-npm-registry.yml
    permissions:
      id-token: write
      contents: read
    with:
      dry_run: false
      tag: ${{ github.event.inputs.tag-name }}

  publish-github-packages:
    name: Publish to GitHub Packages
    needs: release
    uses: ./.github/workflows/publish-github-packages.yml
    permissions:
      contents: read
      packages: write
    with:
      tag: ${{ github.event.inputs.tag-name }}
